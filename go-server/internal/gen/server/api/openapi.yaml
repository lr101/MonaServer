openapi: 3.0.3
info:
  title: Stick-It RESP API
  version: 1.0.1
servers:
- url: https://stick-it.lr-projects.de
- url: http://localhost:8081
tags:
- description: Everything about the public apiF
  name: public
- description: Everything about Authentication
  name: auth
- description: Everything about Groups
  name: groups
- description: Everything about Pins
  name: pins
- description: Everything about Users
  name: users
- description: Everything about Memberships
  name: members
- description: Everything about Reports
  name: report
- description: Everything about Likes
  name: likes
- description: Everything only allowed by Admins
  name: admin
- description: Everything about user rankings
  name: ranking
paths:
  /api/v2/groups:
    get:
      operationId: getGroupsByIds
      parameters:
      - description: Comma-separated list of group IDs
        in: query
        name: ids
        schema:
          items:
            $ref: "#/components/schemas/id"
          type: array
      - description: search term used to find a group name
        in: query
        name: search
        schema:
          $ref: "#/components/schemas/shortString"
      - description: this is the userId used when withUser is set to true or false
        in: query
        name: userId
        schema:
          $ref: "#/components/schemas/id"
      - description: use false if user groups should be included and true if user
          groups should be excluded from search
        in: query
        name: withUser
        schema:
          type: boolean
      - description: use false if profile picture should not be returned and true
          if it should. Defaults to false
        in: query
        name: withImages
        schema:
          default: false
          type: boolean
      - description: page number
        in: query
        name: page
        schema:
          type: integer
      - description: page size. Defaults to 20
        in: query
        name: size
        schema:
          default: 20
          type: integer
      - description: only include groups that have been updated after this date. If
          set all deleted groups after this time are returned.
        in: query
        name: updatedAfter
        schema:
          $ref: "#/components/schemas/date"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/groupsSyncDto"
          description: Successful response
      security:
      - token: []
      summary: Get groups by IDs
      tags:
      - groups
    post:
      operationId: addGroup
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/createGroupDto"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/groupDto"
          description: Successful response
        "400":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/longString"
          description: Image can not be used or is not square
      security:
      - token: []
      summary: Create a new group
      tags:
      - groups
  /api/v2/groups/{groupId}:
    delete:
      operationId: deleteGroup
      parameters:
      - in: path
        name: groupId
        required: true
        schema:
          $ref: "#/components/schemas/id"
      responses:
        "200":
          description: Deleted
        "404":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/longString"
          description: Group does not exist
      security:
      - token: []
      summary: Delete a group by ID
      tags:
      - groups
    get:
      operationId: getGroup
      parameters:
      - in: path
        name: groupId
        required: true
        schema:
          $ref: "#/components/schemas/id"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/groupDto"
          description: Successful response
        "404":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/longString"
          description: Group does not exist
      security:
      - token: []
      summary: Get a group by ID
      tags:
      - groups
    put:
      operationId: updateGroup
      parameters:
      - in: path
        name: groupId
        required: true
        schema:
          $ref: "#/components/schemas/id"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/updateGroupDto"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/groupDto"
          description: Successful response
        "400":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/longString"
          description: Image can not be used or is not square
        "404":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/longString"
          description: Group does not exist
      security:
      - token: []
      summary: Update a group by ID
      tags:
      - groups
  /api/v2/groups/{groupId}/profile_image:
    get:
      operationId: getGroupProfileImage
      parameters:
      - description: group id
        in: path
        name: groupId
        required: true
        schema:
          $ref: "#/components/schemas/id"
      - description: "When true, this endpoint redirects directly to the target image\
          \ otherwise the image URL is returned"
        in: query
        name: redirect
        required: false
        schema:
          default: false
          type: boolean
      responses:
        "200":
          content:
            image/*:
              schema:
                $ref: "#/components/schemas/imageUrl"
          description: Successful response
        "301":
          description: Successful redirect to image
        "404":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/longString"
          description: Group does not exist
      security:
      - token: []
      summary: Get profile of group
      tags:
      - groups
  /api/v2/groups/{groupId}/profile_image_small:
    get:
      operationId: getGroupProfileImageSmall
      parameters:
      - description: group id
        in: path
        name: groupId
        required: true
        schema:
          $ref: "#/components/schemas/id"
      - description: "When true, this endpoint redirects directly to the target image\
          \ otherwise the image URL is returned"
        in: query
        name: redirect
        required: false
        schema:
          default: false
          type: boolean
      responses:
        "200":
          content:
            image/*:
              schema:
                $ref: "#/components/schemas/imageUrl"
          description: Successful response
        "301":
          description: Successful redirect to image
        "404":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/longString"
          description: Group does not exist
      security:
      - token: []
      summary: Get small profile image url of group
      tags:
      - groups
  /api/v2/groups/{groupId}/pin_image:
    get:
      operationId: getGroupPinImage
      parameters:
      - description: group id
        in: path
        name: groupId
        required: true
        schema:
          $ref: "#/components/schemas/id"
      - description: "When true, this endpoint redirects directly to the target image\
          \ otherwise the image URL is returned"
        in: query
        name: redirect
        required: false
        schema:
          default: false
          type: boolean
      responses:
        "200":
          content:
            image/png:
              schema:
                $ref: "#/components/schemas/imageUrl"
          description: Successful response
        "301":
          description: Successful redirect to image
        "404":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/longString"
          description: Group does not exist
      security:
      - token: []
      summary: Get pin image of group
      tags:
      - groups
  /api/v2/groups/{groupId}/description:
    get:
      operationId: getGroupDescription
      parameters:
      - description: group id
        in: path
        name: groupId
        required: true
        schema:
          $ref: "#/components/schemas/id"
      responses:
        "200":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/shortString"
          description: Successful response
        "404":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/longString"
          description: Group does not exist
      security:
      - token: []
      summary: Get description of group
      tags:
      - groups
  /api/v2/groups/{groupId}/link:
    get:
      operationId: getGroupLink
      parameters:
      - description: group id
        in: path
        name: groupId
        required: true
        schema:
          $ref: "#/components/schemas/id"
      responses:
        "200":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/shortString"
          description: Successful response
        "404":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/longString"
          description: Group does not exist
      security:
      - token: []
      summary: Get link of group
      tags:
      - groups
  /api/v2/groups/{groupId}/admin:
    get:
      operationId: getGroupAdmin
      parameters:
      - description: group id
        in: path
        name: groupId
        required: true
        schema:
          $ref: "#/components/schemas/id"
      responses:
        "200":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/shortString"
          description: Successful response
        "404":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/longString"
          description: Group does not exist
      security:
      - token: []
      summary: Get admin of group
      tags:
      - groups
  /api/v2/groups/{groupId}/invite_url:
    get:
      operationId: getGroupInviteUrl
      parameters:
      - description: group id
        in: path
        name: groupId
        required: true
        schema:
          $ref: "#/components/schemas/id"
      responses:
        "200":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/shortString"
          description: Successful response
        "404":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/longString"
          description: Group does not exist
      security:
      - token: []
      summary: Get invite url of group
      tags:
      - groups
  /api/v2/groups/{groupId}/members:
    delete:
      operationId: deleteMemberFromGroup
      parameters:
      - in: path
        name: groupId
        required: true
        schema:
          $ref: "#/components/schemas/id"
      - description: userId
        in: query
        name: userId
        required: true
        schema:
          $ref: "#/components/schemas/id"
      responses:
        "200":
          description: Deleted
        "404":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/longString"
          description: Group or user does not exist
        "409":
          description: User cannot leave as group admin when the group is not empty
      security:
      - token: []
      summary: leave group or delete group when the user is the last group member
      tags:
      - members
    get:
      operationId: getGroupMembers
      parameters:
      - in: path
        name: groupId
        required: true
        schema:
          $ref: "#/components/schemas/id"
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/memberResponseDto"
                type: array
          description: Successful response
        "404":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/longString"
          description: Group does not exist
      security:
      - token: []
      summary: Get members of a group by ID
      tags:
      - members
    post:
      operationId: joinGroup
      parameters:
      - in: path
        name: groupId
        required: true
        schema:
          $ref: "#/components/schemas/id"
      - description: id of user
        in: query
        name: userId
        required: true
        schema:
          $ref: "#/components/schemas/id"
      - description: inviteUrl to authorize a user to join a private group
        in: query
        name: inviteUrl
        schema:
          $ref: "#/components/schemas/shortString"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/groupDto"
          description: Successful response
        "400":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/longString"
          description: Group or user does not exist
        "403":
          description: inviteUrl does not match
        "404":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/longString"
          description: Group or user does not exist
        "409":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/longString"
          description: User is already a member
      security:
      - token: []
      summary: Add a member to a group by ID
      tags:
      - members
  /api/v2/public/delete-code/{username}:
    get:
      operationId: generateDeleteCode
      parameters:
      - description: userId
        in: path
        name: username
        required: true
        schema:
          $ref: "#/components/schemas/shortString"
      responses:
        "201":
          description: Delete code generated and sent to the user
        "400":
          description: E-Mail could not be send
        "401":
          description: Unauthorized
        "404":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/longString"
          description: User does not exist
      security:
      - token: []
      summary: Generate delete code
      tags:
      - auth
  /api/v2/public/recover:
    get:
      operationId: requestPasswordRecovery
      parameters:
      - in: query
        name: username
        required: true
        schema:
          $ref: "#/components/schemas/shortString"
      responses:
        "201":
          description: Recovery email sent
        "400":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/longString"
          description: E-Mail could not be send
        "503":
          description: Unique code could not be generated. Contact the developer under
            lr.dev.projects@gmail.com
      summary: Request password recovery
      tags:
      - auth
  /api/v2/public/login:
    post:
      operationId: userLogin
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/userLogin_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/tokenResponseDto"
          description: Successful login
        "400":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/longString"
          description: Wrong password or user does not exist
      summary: User login
      tags:
      - auth
  /api/v2/public/signup:
    post:
      operationId: createUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/userRequestDto"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/tokenResponseDto"
          description: User registered successfully
        "400":
          description: Registration failed
        "409":
          description: Username already exists
      summary: User registration
      tags:
      - auth
  /api/v2/public/refresh:
    post:
      description: Request a new access token with a refresh token
      operationId: refreshToken
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/refreshTokenRequestDto"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/tokenResponseDto"
          description: Successfully applied new access token
        "403":
          description: Invalid refresh token try logging in again
      summary: Request a new access token
      tags:
      - auth
  /api/v2/report:
    post:
      operationId: createReport
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/reportDto"
        required: true
      responses:
        "201":
          description: Report submitted successfully
        "400":
          description: User not found
        "503":
          description: Mail service at the moment not reachable
      security:
      - token: []
      summary: Report content
      tags:
      - report
  /api/v2/pins:
    get:
      operationId: getPinImagesByIds
      parameters:
      - description: Comma-separated list of image IDs
        in: query
        name: ids
        schema:
          items:
            $ref: "#/components/schemas/id"
          type: array
      - description: Only pins of this group are returned
        in: query
        name: groupId
        schema:
          $ref: "#/components/schemas/id"
      - description: Only pins of this user are returned
        in: query
        name: userId
        schema:
          $ref: "#/components/schemas/id"
      - description: Describes if the images of the pins should be returned too
        in: query
        name: withImage
        schema:
          default: false
          type: boolean
      - description: Compression level for images (optional)
        in: query
        name: compression
        schema:
          maximum: 100
          minimum: 0
          type: integer
      - description: Height for images (optional)
        in: query
        name: height
        schema:
          maximum: 10000
          minimum: 0
          type: integer
      - description: page number (can only be used when ids is not set). Sorted by
          creation date descending
        in: query
        name: page
        schema:
          type: integer
      - description: page size. Defaults to 20
        in: query
        name: size
        schema:
          default: 20
          type: integer
      - description: only include pins that have been updated after this date.If set
          all deleted pins after this time are returned.
        in: query
        name: updatedAfter
        schema:
          $ref: "#/components/schemas/date"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pinsSyncDto"
          description: Successful response
      security:
      - token: []
      summary: Get images by IDs
      tags:
      - pins
    post:
      operationId: createPin
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/pinRequestDto"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pinWithOptionalImageDto"
          description: Successful response
      security:
      - token: []
      summary: Create a new pin
      tags:
      - pins
  /api/v2/pins/{pinId}:
    delete:
      operationId: deletePin
      parameters:
      - in: path
        name: pinId
        required: true
        schema:
          $ref: "#/components/schemas/id"
      responses:
        "200":
          description: successfully deleted
        "404":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/longString"
          description: Pin does not exist
      security:
      - token: []
      summary: Delete a pin by ID
      tags:
      - pins
    get:
      operationId: getPin
      parameters:
      - in: path
        name: pinId
        required: true
        schema:
          $ref: "#/components/schemas/id"
      - description: Describes if the image of the pin should be returned too
        in: query
        name: withImage
        schema:
          default: false
          type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pinWithOptionalImageDto"
          description: Successful response
        "404":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/longString"
          description: Pin does not exist
      security:
      - token: []
      summary: Get pin information by ID
      tags:
      - pins
  /api/v2/pins/{pinId}/image:
    get:
      operationId: getPinImage
      parameters:
      - in: path
        name: pinId
        required: true
        schema:
          $ref: "#/components/schemas/id"
      - description: "When true, this endpoint redirects directly to the target image\
          \ otherwise the image URL is returned"
        in: query
        name: redirect
        required: false
        schema:
          default: false
          type: boolean
      responses:
        "200":
          content:
            image/*:
              schema:
                $ref: "#/components/schemas/imageUrl"
          description: Successful response
        "301":
          description: Successful redirect to target image
        "404":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/longString"
          description: Pin does not exist
      security:
      - token: []
      summary: Get the image associated with a pin by ID
      tags:
      - pins
  /api/v2/pins/{pinId}/likes:
    get:
      description: Get pin likes
      operationId: getPinLikes
      parameters:
      - in: path
        name: pinId
        required: true
        schema:
          $ref: "#/components/schemas/id"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pinLikeDto"
          description: OK
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "400":
          description: Bad request
        "404":
          description: Pin not found
      security:
      - token: []
      summary: Get pin likes
      tags:
      - likes
    post:
      description: Create or update a like
      operationId: createOrUpdateLike
      parameters:
      - in: path
        name: pinId
        required: true
        schema:
          $ref: "#/components/schemas/id"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/createLikeDto"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pinLikeDto"
          description: Created or updated
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "400":
          description: Bad request
        "404":
          description: Pin not found
      security:
      - token: []
      summary: Create or update a like
      tags:
      - likes
  /api/v2/users/{userId}/likes:
    get:
      operationId: getUserLikes
      parameters:
      - in: path
        name: userId
        required: true
        schema:
          $ref: "#/components/schemas/id"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/userLikesDto"
          description: Successfully returned user's likes
      security:
      - token: []
      summary: Get user's likes
      tags:
      - likes
  /api/v2/public/infos:
    get:
      operationId: getServerInfo
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/infoDto"
                type: array
          description: Successful response
      summary: Get public server statistics
      tags:
      - public
  /api/v2/users/{userId}:
    delete:
      operationId: deleteUser
      parameters:
      - in: path
        name: userId
        required: true
        schema:
          $ref: "#/components/schemas/id"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/code"
      responses:
        "200":
          description: Deleted
        "404":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/longString"
          description: User does not exist
      security:
      - token: []
      summary: Delete a user by userId
      tags:
      - users
    get:
      operationId: getUser
      parameters:
      - in: path
        name: userId
        required: true
        schema:
          $ref: "#/components/schemas/id"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/userInfoDto"
          description: Get successfull
        "404":
          content:
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/longString"
          description: User does not exist
      security:
      - token: []
      summary: Get a user by userId
      tags:
      - users
    put:
      operationId: updateUser
      parameters:
      - in: path
        name: userId
        required: true
        schema:
          $ref: "#/components/schemas/id"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/userUpdateDto"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/userUpdateResponseDto"
          description: Update successfull
        "404":
          content:
