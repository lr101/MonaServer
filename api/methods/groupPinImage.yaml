get:
  operationId: getGroupPinImage
  security:
    - token: [ ]
  summary: Get pin image of group
  tags:
    - groups
  parameters:
    - name: groupId
      required: true
      in: path
      description: group id
      schema:
        $ref: '../parameters/id.yaml'
    - name: redirect
      in: query
      required: false
      description: When true, this endpoint redirects directly to the target image otherwise the image URL is returned
      schema:
        type: boolean
        default: false
  responses:
    '200':
      description: Successful response
      content:
        image/png:
          schema:
            $ref: '../parameters/imageUrl.yaml'
    301:
      description: Successful redirect to image
    404:
      description: Group does not exist
      content:
        text/plain; charset=utf-8:
          schema:
            $ref: '../parameters/longString.yaml'