get:
  operationId: getPinImage
  security:
    - token: [ ]
  summary: Get the image associated with a pin by ID
  tags:
    - pins
  parameters:
    - name: pinId
      in: path
      required: true
      schema:
        $ref: '../parameters/id.yaml'
    - name: redirect
      in: query
      required: false
      description: When true, this endpoint redirects directly to the target image otherwise the image URL is returned
      schema:
        type: boolean
        default: false
  responses:
    '200':
      description: Successful response
      content:
        image/*:
          schema:
            $ref: '../parameters/imageUrl.yaml'
    301:
      description: Successful redirect to target image
    404:
      description: Pin does not exist
      content:
        text/plain; charset=utf-8:
          schema:
            $ref: '../parameters/longString.yaml'