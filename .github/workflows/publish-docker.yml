name: Docker Publish

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-and-publish-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Install xmlstarlet
        run: sudo apt-get install -y xmlstarlet

      - name: Extract and Compute Version
        id: compute_version
        run: |
          # Extract version from pom.xml
          POM_VERSION=$(xmlstarlet sel -t -v "/_:project/_:version" pom.xml)
          echo "Extracted POM_VERSION=$POM_VERSION"
          
          # Strip '-SNAPSHOT' if it exists to get a clean base version
          BASE_VERSION=${POM_VERSION/-SNAPSHOT/}
          
          # Determine tag based on the branch triggering the workflow
          if [ "${{ github.ref_name }}" == "main" ]; then
            # Main branch: Guaranteed increasing number
            FINAL_TAG="${BASE_VERSION}.${{ github.run_number }}"
            echo "is_main=true" >> "$GITHUB_OUTPUT"
          else
            # Develop branch: SNAPSHOT
            FINAL_TAG="${BASE_VERSION}-SNAPSHOT"
            echo "is_main=false" >> "$GITHUB_OUTPUT"
          fi
          
          # Set the tag as a step output using the modern syntax
          echo "tag=$FINAL_TAG" >> "$GITHUB_OUTPUT"
          echo "Computed FINAL_TAG=$FINAL_TAG"

      - name: Create settings.xml for GitHub Packages authentication
        run: |
          echo "<settings xmlns='http://maven.apache.org/SETTINGS/1.0.0' xmlns:xsi='http://www.w3.org/2001/XMLSchema-instance' xsi:schemaLocation='http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd'>" > ~/.m2/settings.xml
          echo "<servers><server><id>github</id><username>lr101</username><password>${{ secrets.GH_TOKEN }}</password></server></servers>" >> ~/.m2/settings.xml
          echo "</settings>" >> ~/.m2/settings.xml

      - name: Test
        run: mvn test

      - name: Build Docker image
        run: mvn spring-boot:build-image -Dspring-boot.build-image.imageName=lrprojects/stick-it-server:${{ steps.compute_version.outputs.tag }} --settings ~/.m2/settings.xml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Publish base Docker image
        run: |
          docker push lrprojects/stick-it-server:${{ steps.compute_version.outputs.tag }}

      - name: Tag and Publish :latest (Main only)
        if: steps.compute_version.outputs.is_main == 'true'
        run: |
          docker tag lrprojects/stick-it-server:${{ steps.compute_version.outputs.tag }} lrprojects/stick-it-server:latest
          docker push lrprojects/stick-it-server:latest

      - name: Tag and Publish :snapshot (Develop only)
        if: steps.compute_version.outputs.is_main == 'false'
        run: |
          docker tag lrprojects/stick-it-server:${{ steps.compute_version.outputs.tag }} lrprojects/stick-it-server:snapshot
          docker push lrprojects/stick-it-server:snapshot